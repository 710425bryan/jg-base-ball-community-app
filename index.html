<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" href="/少棒元素_20260324_232837_0000.png" />
    <link rel="apple-touch-icon" href="/少棒元素_20260324_232837_0000.png" />
    <title>中港熊戰棒球隊</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // iOS Safari Zoom 防護機制 (因應 Safari 10+ 忽略 user-scalable=no)
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        let now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) { event.preventDefault(); }
        lastTouchEnd = now;
      }, { passive: false });
      document.addEventListener('touchmove', function(event) {
        if (event.touches.length > 1) { event.preventDefault(); } // 雙指或多指滑動
      }, { passive: false });
    </script>
  </body>
</html>
